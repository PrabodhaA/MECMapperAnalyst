<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MEC Map Analyst</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #ffffff;
    --bg2: #f7f8fa;
    --bg3: #f0f1f4;
    --border: #e2e4e9;
    --border2: #d0d3db;
    --text: #1a1d24;
    --text2: #6b7280;
    --text3: #9ca3af;
    --accent: #2C3E50;
    --accent2: #3d5166;
    --blue: #2980B9;
    --blue-light: #ebf4fb;
    --green: #27AE60;
    --radius: 12px;
    --radius-sm: 8px;
  }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: var(--bg2);
    color: var(--text);
    height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 1rem;
  }

  .app {
    width: 100%;
    max-width: 760px;
    height: calc(100vh - 2rem);
    max-height: 860px;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    display: flex;
    flex-direction: column;
    overflow: hidden;
    box-shadow: 0 4px 24px rgba(0,0,0,.06);
  }

  /* ── Top bar ── */
  .topbar {
    padding: .75rem 1rem;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 10px;
    flex-shrink: 0;
    background: var(--bg);
  }
  .topbar-logo {
    width: 30px; height: 30px;
    background: var(--accent);
    border-radius: 7px;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }
  .topbar-info { flex: 1; min-width: 0; }
  .topbar-title { font-size: 14px; font-weight: 600; }
  .topbar-sub { font-size: 11px; color: var(--text2); margin-top: 1px; }
  .map-pill {
    display: none;
    align-items: center;
    gap: 5px;
    padding: 3px 10px 3px 7px;
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 20px;
    font-size: 11px;
    color: var(--text2);
    flex-shrink: 0;
    max-width: 180px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .map-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--green); flex-shrink: 0; }
  .new-btn {
    font-size: 12px;
    padding: 4px 12px;
    border: 1px solid var(--border2);
    border-radius: 20px;
    background: none;
    color: var(--text2);
    cursor: pointer;
    flex-shrink: 0;
  }
  .new-btn:hover { background: var(--bg2); }

  /* ── Chat area ── */
  .chat-area {
    flex: 1;
    overflow-y: auto;
    padding: 1.25rem 1rem;
    display: flex;
    flex-direction: column;
    gap: .875rem;
    scroll-behavior: smooth;
  }
  .chat-area::-webkit-scrollbar { width: 4px; }
  .chat-area::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }

  /* ── Welcome screen ── */
  .welcome {
    margin: auto;
    text-align: center;
    padding: 2rem 1rem;
    max-width: 420px;
  }
  .welcome-icon {
    width: 52px; height: 52px;
    background: var(--accent);
    border-radius: 14px;
    display: flex; align-items: center; justify-content: center;
    margin: 0 auto 14px;
  }
  .welcome h2 { font-size: 17px; font-weight: 600; margin-bottom: 8px; }
  .welcome p { font-size: 13px; color: var(--text2); line-height: 1.6; }
  .upload-cta {
    display: inline-flex;
    align-items: center;
    gap: 7px;
    margin-top: 16px;
    padding: .65rem 1.25rem;
    background: var(--accent);
    color: white;
    border: none;
    border-radius: var(--radius-sm);
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    transition: opacity .15s;
  }
  .upload-cta:hover { opacity: .87; }

  /* ── Suggestion chips ── */
  .suggestions {
    display: flex;
    flex-direction: column;
    gap: 5px;
    margin-top: 12px;
  }
  .sug-label { font-size: 11px; color: var(--text3); margin-bottom: 2px; }
  .sug-btn {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    padding: .5rem .85rem;
    font-size: 12px;
    color: var(--text2);
    cursor: pointer;
    text-align: left;
    transition: background .15s, color .15s;
  }
  .sug-btn:hover { background: var(--bg3); color: var(--text); }

  /* ── Message bubbles ── */
  .msg { display: flex; gap: 8px; align-items: flex-start; }
  .msg.user { flex-direction: row-reverse; }
  .avatar {
    width: 27px; height: 27px;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 10px; font-weight: 600;
    flex-shrink: 0; margin-top: 2px;
  }
  .avatar.bot { background: var(--accent); color: white; }
  .avatar.user { background: var(--blue-light); color: var(--blue); }
  .bubble {
    max-width: 82%;
    padding: .65rem .95rem;
    border-radius: var(--radius);
    font-size: 13px;
    line-height: 1.65;
  }
  .bubble.bot {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-top-left-radius: 4px;
  }
  .bubble.user {
    background: var(--accent);
    color: white;
    border-top-right-radius: 4px;
  }
  .bubble table {
    border-collapse: collapse;
    width: 100%;
    font-size: 12px;
    margin: .5rem 0;
  }
  .bubble table th {
    background: var(--bg3);
    padding: 5px 8px;
    text-align: left;
    border: 1px solid var(--border2);
    font-weight: 600;
  }
  .bubble table td {
    padding: 4px 8px;
    border: 1px solid var(--border);
    vertical-align: top;
  }
  .bubble code {
    background: var(--bg3);
    padding: 1px 5px;
    border-radius: 4px;
    font-family: 'SF Mono', Consolas, monospace;
    font-size: 11px;
  }
  .bubble b, .bubble strong { font-weight: 600; }

  /* Map upload card */
  .map-card {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: .75rem 1rem;
    display: flex;
    align-items: center;
    gap: 10px;
    max-width: 82%;
  }
  .map-card-icon {
    width: 32px; height: 32px;
    background: var(--blue-light);
    border-radius: 7px;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }
  .map-card-info { flex: 1; min-width: 0; }
  .map-card-name { font-size: 13px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .map-card-meta { font-size: 11px; color: var(--text2); margin-top: 2px; }
  .map-card-status {
    font-size: 10px; font-weight: 600;
    padding: 2px 9px;
    border-radius: 20px;
    background: #e8f5e9; color: #1b5e20;
    flex-shrink: 0;
  }

  /* Typing indicator */
  .typing-wrap { display: flex; gap: 8px; align-items: flex-start; }
  .typing {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    border-top-left-radius: 4px;
    padding: .65rem .85rem;
    display: flex; gap: 4px; align-items: center;
  }
  .typing span {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--text3);
    animation: bounce .9s infinite;
  }
  .typing span:nth-child(2) { animation-delay: .15s; }
  .typing span:nth-child(3) { animation-delay: .3s; }
  @keyframes bounce { 0%,60%,100%{transform:translateY(0)} 30%{transform:translateY(-5px)} }

  /* ── Input bar ── */
  .input-bar {
    padding: .75rem;
    border-top: 1px solid var(--border);
    display: flex;
    gap: .5rem;
    align-items: flex-end;
    flex-shrink: 0;
    background: var(--bg);
  }
  .input-wrap {
    flex: 1;
    display: flex;
    align-items: flex-end;
    gap: .5rem;
    border: 1px solid var(--border2);
    border-radius: var(--radius);
    padding: .5rem .75rem;
    transition: border-color .15s;
  }
  .input-wrap:focus-within { border-color: var(--blue); }
  .attach-btn {
    background: none; border: none;
    cursor: pointer; color: var(--text3);
    padding: 2px; display: flex; flex-shrink: 0;
    transition: color .15s;
  }
  .attach-btn:hover { color: var(--text2); }
  #msgInput {
    flex: 1; border: none; background: transparent;
    font-size: 13px; color: var(--text);
    font-family: inherit;
    resize: none; outline: none;
    min-height: 20px; max-height: 120px;
    line-height: 1.5;
  }
  #msgInput::placeholder { color: var(--text3); }
  .send-btn {
    width: 32px; height: 32px;
    border-radius: 50%;
    background: var(--accent);
    border: none; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    transition: opacity .15s;
  }
  .send-btn:hover { opacity: .85; }
  .send-btn:disabled { opacity: .3; cursor: not-allowed; }

  /* Error toast */
  .toast {
    position: fixed; bottom: 1.5rem; left: 50%;
    transform: translateX(-50%);
    background: #c0392b; color: white;
    padding: .65rem 1.25rem;
    border-radius: var(--radius-sm);
    font-size: 13px;
    display: none;
    z-index: 999;
    box-shadow: 0 4px 12px rgba(0,0,0,.2);
  }
</style>
</head>
<body>

<div class="app">
  <!-- Top bar -->
  <div class="topbar">
    <div class="topbar-logo">
      <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="white" stroke-width="1.5">
        <rect x="1" y="1" width="14" height="14" rx="2"/>
        <path d="M4 5h8M4 8h6M4 11h7"/>
      </svg>
    </div>
    <div class="topbar-info">
      <div class="topbar-title">MEC map analyst</div>
      <div class="topbar-sub" id="topbarSub">Upload a .map file to start</div>
    </div>
    <div class="map-pill" id="mapPill">
      <div class="map-dot"></div>
      <span id="mapPillName"></span>
    </div>
    <button class="new-btn" onclick="newSession()">New session</button>
  </div>

  <!-- Chat messages -->
  <div class="chat-area" id="chatArea">
    <div class="welcome" id="welcome">
      <div class="welcome-icon">
        <svg width="26" height="26" viewBox="0 0 26 26" fill="none" stroke="white" stroke-width="1.5">
          <rect x="2" y="2" width="22" height="22" rx="3"/>
          <path d="M7 9h12M7 13h9M7 17h10"/>
        </svg>
      </div>
      <h2>MEC map analyst</h2>
      <p>Upload an Infor MEC / IEC mapper file (.map) and ask anything — flow, APIs, field mapping, bugs, or any custom question.</p>
      <button class="upload-cta" onclick="document.getElementById('fileInput').click()">
        <svg width="13" height="13" viewBox="0 0 13 13" fill="none" stroke="white" stroke-width="1.5">
          <path d="M6.5 9V3M4 5.5L6.5 3 9 5.5"/>
          <rect x="1" y="10" width="11" height="1.5" rx=".75"/>
        </svg>
        Upload .map file
      </button>
    </div>
  </div>

  <!-- Input bar -->
  <div class="input-bar">
    <div class="input-wrap">
      <button class="attach-btn" onclick="document.getElementById('fileInput').click()" title="Upload .map file">
        <svg width="17" height="17" viewBox="0 0 17 17" fill="none" stroke="currentColor" stroke-width="1.5">
          <path d="M14.5 8.5V12a2.5 2.5 0 01-2.5 2.5H5A2.5 2.5 0 012.5 12V5A2.5 2.5 0 015 2.5h3"/>
          <path d="M11 2h4v4"/>
          <path d="M11 6l4-4"/>
        </svg>
      </button>
      <textarea id="msgInput" rows="1"
        placeholder="Ask anything about this map..."
        onkeydown="handleKey(event)"
        oninput="autoGrow(this); checkSend()"></textarea>
      <button class="send-btn" id="sendBtn" onclick="sendMessage()" disabled>
        <svg width="13" height="13" viewBox="0 0 13 13" fill="none" stroke="white" stroke-width="2">
          <path d="M6.5 10V3M4 5.5L6.5 3 9 5.5"/>
        </svg>
      </button>
    </div>
  </div>
</div>

<!-- Hidden file input -->
<input type="file" id="fileInput" accept=".map,.xml" style="display:none" onchange="handleFileSelect(this)">

<!-- Error toast -->
<div class="toast" id="toast"></div>

<script>
// ── State ──────────────────────────────────────────────────────────────────
const API_BASE = '/api'; // Azure Function base — same origin in production

let state = {
  mapFile: null,
  mapName: '',
  mapSummary: '',     // assistant's first reply after map upload
  history: [],        // [{role, content}]
  thinking: false
};

// ── File handling ──────────────────────────────────────────────────────────
function handleFileSelect(input) {
  if (!input.files.length) return;
  const file = input.files[0];
  state.mapFile = file;
  state.mapName = file.name;
  uploadMap(file);
  input.value = '';
}

async function uploadMap(file) {
  setThinking(true);
  hideWelcome();
  addMapCard(file);
  addTyping();

  try {
    const formData = new FormData();
    formData.append('mapFile', file);
    formData.append('request', JSON.stringify({
      message: 'Map uploaded — please confirm receipt.',
      history: []
    }));

    const res = await fetch(`${API_BASE}/chat`, {
      method: 'POST',
      body: formData
    });

    removeTyping();

    if (!res.ok) {
      const err = await res.json().catch(() => ({ error: 'Unknown error' }));
      showError(err.error || 'Failed to analyse map.');
      setThinking(false);
      return;
    }

    const data = await res.json();
    state.mapSummary = data.reply;

    // Add assistant summary message
    addBotMessage(data.reply);

    // Add suggestion chips after first response
    addSuggestions();

    // Update topbar
    document.getElementById('mapPill').style.display = 'flex';
    document.getElementById('mapPillName').textContent = state.mapName;
    document.getElementById('topbarSub').textContent = state.mapName + ' · ready';

  } catch (e) {
    removeTyping();
    showError('Could not connect to the server. Is the Azure Function running?');
  }

  setThinking(false);
}

// ── Send message ──────────────────────────────────────────────────────────
async function sendMessage() {
  const input = document.getElementById('msgInput');
  const message = input.value.trim();
  if (!message || state.thinking) return;

  if (!state.mapFile) {
    document.getElementById('fileInput').click();
    return;
  }

  input.value = '';
  input.style.height = '';
  checkSend();

  addUserMessage(message);
  setThinking(true);
  addTyping();

  // Add to history before sending
  state.history.push({ role: 'user', content: message });

  try {
    const res = await fetch(`${API_BASE}/chat`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        message,
        mapSummary: state.mapSummary,
        history: state.history.slice(-20) // keep last 20 turns to manage tokens
      })
    });

    removeTyping();

    if (!res.ok) {
      const err = await res.json().catch(() => ({ error: 'Unknown error' }));
      showError(err.error || 'Failed to get a response.');
      state.history.pop(); // remove failed message
      setThinking(false);
      return;
    }

    const data = await res.json();
    addBotMessage(data.reply);
    state.history.push({ role: 'assistant', content: data.reply });

  } catch (e) {
    removeTyping();
    showError('Could not connect to the server.');
    state.history.pop();
  }

  setThinking(false);
}

// ── UI helpers ────────────────────────────────────────────────────────────
function hideWelcome() {
  const w = document.getElementById('welcome');
  if (w) w.remove();
}

function addMapCard(file) {
  const area = document.getElementById('chatArea');
  const wrap = document.createElement('div');
  wrap.style.cssText = 'display:flex;gap:8px;align-items:flex-start';
  wrap.innerHTML = `
    <div class="avatar bot">M</div>
    <div class="map-card">
      <div class="map-card-icon">
        <svg width="15" height="15" viewBox="0 0 15 15" fill="none" stroke="#2980B9" stroke-width="1.5">
          <rect x="2" y="1" width="11" height="13" rx="1.5"/>
          <path d="M5 5h5M5 7.5h5M5 10h4"/>
        </svg>
      </div>
      <div class="map-card-info">
        <div class="map-card-name">${escHtml(file.name)}</div>
        <div class="map-card-meta">${(file.size / 1024).toFixed(1)} KB · IEC / MEC mapper XML</div>
      </div>
      <span class="map-card-status">Analysing...</span>
    </div>`;
  area.appendChild(wrap);
  scrollBottom();
  // Update status after a moment
  setTimeout(() => {
    const status = wrap.querySelector('.map-card-status');
    if (status) { status.textContent = 'Loaded'; status.style.background = '#e8f5e9'; }
  }, 1500);
}

function addBotMessage(text) {
  const area = document.getElementById('chatArea');
  const wrap = document.createElement('div');
  wrap.className = 'msg';
  wrap.innerHTML = `
    <div class="avatar bot">M</div>
    <div class="bubble bot">${formatMessage(text)}</div>`;
  area.appendChild(wrap);
  scrollBottom();
}

function addUserMessage(text) {
  const area = document.getElementById('chatArea');
  const wrap = document.createElement('div');
  wrap.className = 'msg user';
  wrap.innerHTML = `
    <div class="avatar user">You</div>
    <div class="bubble user">${escHtml(text)}</div>`;
  area.appendChild(wrap);
  scrollBottom();
}

function addTyping() {
  const area = document.getElementById('chatArea');
  const wrap = document.createElement('div');
  wrap.className = 'typing-wrap';
  wrap.id = 'typingIndicator';
  wrap.innerHTML = `
    <div class="avatar bot">M</div>
    <div class="typing"><span></span><span></span><span></span></div>`;
  area.appendChild(wrap);
  scrollBottom();
}

function removeTyping() {
  document.getElementById('typingIndicator')?.remove();
}

function addSuggestions() {
  const area = document.getElementById('chatArea');
  const wrap = document.createElement('div');
  wrap.style.cssText = 'display:flex;gap:8px;align-items:flex-start';
  wrap.innerHTML = `
    <div class="avatar bot" style="visibility:hidden">M</div>
    <div class="suggestions">
      <div class="sug-label">Suggested questions</div>
      <button class="sug-btn" onclick="sendSuggestion(this)">What does this map do?</button>
      <button class="sug-btn" onclick="sendSuggestion(this)">Show me the execution flow</button>
      <button class="sug-btn" onclick="sendSuggestion(this)">What M3 APIs does it call?</button>
      <button class="sug-btn" onclick="sendSuggestion(this)">Generate the field mapping table</button>
      <button class="sug-btn" onclick="sendSuggestion(this)">Are there any bugs in this map?</button>
      <button class="sug-btn" onclick="sendSuggestion(this)">What is hardcoded in this map?</button>
    </div>`;
  area.appendChild(wrap);
  scrollBottom();
}

function sendSuggestion(btn) {
  const q = btn.textContent.trim();
  // Remove suggestion block
  btn.closest('.suggestions')?.parentElement?.remove();
  document.getElementById('msgInput').value = q;
  sendMessage();
}

function formatMessage(text) {
  // Convert markdown-like formatting to HTML
  let html = escHtml(text);
  // Bold **text** or __text__
  html = html.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
  html = html.replace(/__(.*?)__/g, '<strong>$1</strong>');
  // Code `text`
  html = html.replace(/`([^`]+)`/g, '<code>$1</code>');
  // Headers ## text
  html = html.replace(/^###\s(.+)$/gm, '<strong>$1</strong>');
  html = html.replace(/^##\s(.+)$/gm, '<strong>$1</strong>');
  // Markdown table
  html = convertTable(html);
  // Line breaks
  html = html.replace(/\n/g, '<br>');
  return html;
}

function convertTable(text) {
  // Detect markdown table and convert to HTML
  const lines = text.split('\n');
  let inTable = false;
  let result = [];
  let tableHtml = '';

  for (let i = 0; i < lines.length; i++) {
    const line = lines[i];
    if (line.includes('|')) {
      if (!inTable) {
        inTable = true;
        tableHtml = '<table>';
        // Check if next line is separator
        const isHeader = lines[i+1] && lines[i+1].includes('---');
        const cells = line.split('|').filter(c => c.trim() !== '');
        const tag = isHeader ? 'th' : 'td';
        tableHtml += '<tr>' + cells.map(c => `<${tag}>${c.trim()}</${tag}>`).join('') + '</tr>';
        if (isHeader) i++; // skip separator
      } else {
        const cells = line.split('|').filter(c => c.trim() !== '');
        tableHtml += '<tr>' + cells.map(c => `<td>${c.trim()}</td>`).join('') + '</tr>';
      }
    } else {
      if (inTable) {
        tableHtml += '</table>';
        result.push(tableHtml);
        inTable = false;
        tableHtml = '';
      }
      result.push(line);
    }
  }
  if (inTable) result.push(tableHtml + '</table>');
  return result.join('\n');
}

function escHtml(text) {
  return text
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}

function scrollBottom() {
  const area = document.getElementById('chatArea');
  setTimeout(() => area.scrollTop = area.scrollHeight, 50);
}

function setThinking(val) {
  state.thinking = val;
  document.getElementById('sendBtn').disabled = val || !document.getElementById('msgInput').value.trim();
}

function checkSend() {
  document.getElementById('sendBtn').disabled =
    state.thinking || !document.getElementById('msgInput').value.trim();
}

function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
}

function autoGrow(el) {
  el.style.height = '';
  el.style.height = Math.min(el.scrollHeight, 120) + 'px';
}

function showError(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.style.display = 'block';
  setTimeout(() => t.style.display = 'none', 4000);
}

function newSession() {
  state = { mapFile: null, mapName: '', mapSummary: '', history: [], thinking: false };
  const area = document.getElementById('chatArea');
  area.innerHTML = '';
  const w = document.createElement('div');
  w.className = 'welcome';
  w.id = 'welcome';
  w.innerHTML = `
